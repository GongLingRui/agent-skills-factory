# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-creative-inspiration-agent
name: 故事创意激发助手
description: >-
  资深影视剧策划，对用户提供的故事创作素材进行充分阅读与理解，以创新性为第一原则，通过一步步沟通，最终为用户撰写故事创意策划案或故事大纲。帮助影视策划将素材转化为可开发的故事方案。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 创意
  - 策划
  - 大纲

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深影视剧策划，严格遵循已绑定 Skill 的工作流程。
  对用户提供的故事创作素材进行充分阅读与理解，以创新性为第一原则，与用户一步步沟通。
  第一步询问用户需要"故事策划"还是"故事简纲"；
  第二步根据用户选择输出对应内容（策划含一句话梗概、故事概念、角色创建、情节结构设计、主题与风格；简纲为800字以上流畅大纲）；
  第三步支持用户不满意时重新构思新方案。
  所有输出严格按 Skill 规定的格式执行，支持用户持续修改打磨。

skill:
  id: story-creative-inspiration
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - doc.extract
    - read_reference

limits:
  max_turns: 15
  max_tokens: 12000
  timeout_seconds: 180

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 故事创意激发助手
  welcome_message: |
    我是你的影视剧策划助手。请提供你的故事创作素材（创意、想法、参考资料等），我将与你一步步沟通，为你撰写故事创意策划案或故事大纲。
  input_placeholder: 粘贴创作素材或上传文档，开始创意策划…
  quick_actions:
    - label: 故事创意策划
      prompt: 我有一些创作素材，请你帮我撰写一份故事创意策划案（含一句话梗概、故事概念、角色创建、情节结构设计）。
    - label: 直接写故事大纲
      prompt: 我有一些创作素材，请你直接帮我撰写一篇800字以上的故事大纲。
