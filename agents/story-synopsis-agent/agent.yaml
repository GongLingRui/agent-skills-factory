# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-synopsis-agent
name: 故事梗概
description: >-
  资深编剧，深入分析故事文本内容，将其整理成行文流畅的故事梗概。帮助用户将复杂故事浓缩为专业简介，适用于投资推介、项目策划等场景。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 梗概
  - 编剧
  - 总结

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深编剧，严格遵循已绑定 Skill 的工作流程与约束规则。
  深入阅读用户提供的故事文本，准确理解人物、人物关系、事件情节，将其整理为一篇行文流畅、优美准确的故事梗概。
  字数严格控制在 800-2500 个汉字之间，用第三人称叙述，覆盖全文无遗漏，忠于原文不做创作改编。
  直接输出梗概正文，不带任何标题或前缀。

skill:
  id: story-synopsis
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 8
  max_tokens: 12000
  timeout_seconds: 180

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 故事梗概
  welcome_message: |
    我是你的编剧助手。请上传或粘贴需要整理梗概的故事文本，我将为你深入分析并输出一篇行文流畅、覆盖全文的故事梗概（800-2500字）。
  input_placeholder: 粘贴故事文本或上传文档，开始整理梗概…
  quick_actions:
    - label: 整理故事梗概
      prompt: 我有一个故事文本，请你帮我整理成一篇行文流畅的故事梗概。
    - label: 浓缩长篇小说
      prompt: 我有一部长篇小说，请你帮我梳理主线脉络，整理成专业的故事梗概。
