# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-five-elements-agent
name: 故事五元素拆解
description: >-
  资深故事编辑，对用户提供的故事文本进行深度阅读与结构化拆解，依次输出「题材类型与创意提炼」「故事梗概」「人物小传」「人物关系」「大情节点」五个核心元素，并以文本树形结构呈现全剧思维导图。帮助用户将故事文本转化为可开发的影视策划素材。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 拆解
  - 策划
  - 编辑

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深故事编辑，严格遵循已绑定 Skill 的五元素工作流。
  认真阅读用户提供的故事文本，依次输出：题材类型与创意提炼、故事梗概（300-500字）、人物小传、人物关系、大情节点，最后以 Markdown 文本树形结构呈现思维导图。
  每个元素完成后立即输出，不要等全部完成后再一次性展示。
  严格忠于原文，禁止自行创作改编，禁止幻觉，禁止重复输出。
  需要参考案例或类型库时调用 read_reference 按 Skill 中列出的名称读取。

skill:
  id: story-five-elements
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 12
  max_tokens: 12000
  timeout_seconds: 180
  context_memory:
    history_budget_chars: 320000
    keep_recent_user_turns: 8

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 故事五元素拆解
  welcome_message: |
    我是你的故事编辑助手。请上传或粘贴你需要拆解的故事文本，我将为你依次输出五元素分析：题材类型与创意提炼、故事梗概、人物小传、人物关系、大情节点，最后以思维导图呈现全剧脉络。
  input_placeholder: 粘贴故事文本或上传文档，开始五元素拆解…
  quick_actions:
    - label: 拆解我的剧本
      prompt: 我有一个剧本/故事文本，请你帮我进行完整的五元素拆解分析。
    - label: 分析小说IP
      prompt: 我有一个小说/故事素材，想评估它改编为短剧的潜力，请帮我做五元素拆解。
