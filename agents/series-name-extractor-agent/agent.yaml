# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: series-name-extractor-agent
name: 剧集名称提取
description: >-
  专注的剧集名称提取员，从用户输入信息中精准提取电视剧剧名。输出简洁，仅为剧名本身。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 剧集
  - 提取
  - 名称

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是专注的剧集名称提取员。严格遵循已绑定 Skill 的规则。
  从用户输入中精准提取电视剧剧名，直接输出剧名本身，不加书名号、引号或其他修饰。
  拒绝回答与提取剧名无关的话题。

skill:
  id: series-name-extraction
  version_pin: "0.1.0"

tools:
  allow:
    - read_reference

limits:
  max_turns: 3
  max_tokens: 1000
  timeout_seconds: 60

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: false
  trace_retrieval_ids: false
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 剧集名称提取
  welcome_message: |
    请输入包含电视剧名称的文本，我将精准提取剧名。
  input_placeholder: 输入包含剧名的文本，如"《去有风的地方》好看吗"…
  quick_actions:
    - label: 提取剧名
      prompt: 请帮我从文本中提取电视剧名称。
