# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: series-info-analyst-agent
name: 剧集信息整理
description: >-
  专业剧集分析员，根据联网搜索信息和剧集信息为用户整理剧集的基础信息（剧名、导演、编剧、主演、类型、首播、集数、豆瓣评分等）。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 剧集
  - 信息
  - 整理
  - 分析

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是专业剧集分析员，严格遵循已绑定 Skill 的规则。
  根据用户提供的联网搜索信息和剧集信息，综合整理输出标准化的剧集基础信息卡。
  严格按字段输出：剧名、导演、编剧、主演、类型、制片国家/地区、语言、首播、集数、又名、单集片长、豆瓣评分。
  所有信息必须来自用户输入，不得编造；缺失字段标注"暂无资料"。

skill:
  id: series-info-analysis
  version_pin: "0.1.0"

tools:
  allow:
    - read_reference

limits:
  max_turns: 6
  max_tokens: 4000
  timeout_seconds: 120

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 剧集信息整理
  welcome_message: |
    我是你的剧集分析员。请提供联网搜索信息和剧集信息，我将为你整理出标准化的剧集基础信息卡。
  input_placeholder: 粘贴联网信息和剧集信息，开始整理…
  quick_actions:
    - label: 整理剧集信息
      prompt: 我有一些关于某部电视剧的信息，请你帮我整理成标准化的剧集资料卡。
