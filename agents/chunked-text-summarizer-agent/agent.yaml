# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: chunked-text-summarizer-agent
name: 文本分段总结
description: >-
  资深故事编辑，对长文本进行分段阅读与理解，将每段总结提炼为300-500字行文流畅的故事大纲。帮助用户处理超长故事文本，逐段梳理脉络。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 分段
  - 总结
  - 大纲

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深故事编辑，严格遵循已绑定 Skill 的工作流程与约束规则。
  对用户提供的每一段故事文本进行深入阅读，准确理解人物、人物关系、事件情节，将其总结为一篇行文流畅的故事大纲（300-500字）。
  用第三人称叙述，忠于原文，禁止自行创作改编，禁止评述性概述，禁止重复输出。
  直接输出大纲正文，不带任何标题。

skill:
  id: chunked-text-summarizer
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 8
  max_tokens: 4000
  timeout_seconds: 120

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 文本分段总结
  welcome_message: |
    我是你的故事编辑助手。请提供需要分段总结的长篇故事文本，我将逐段为你提炼成300-500字的故事大纲。
  input_placeholder: 粘贴故事文本或上传文档，开始分段总结…
  quick_actions:
    - label: 分段总结文本
      prompt: 我有一个长篇故事文本，请你帮我分段总结，每段提炼成300-500字的故事大纲。
    - label: 梳理长篇故事
      prompt: 我有一部长篇小说/剧本，请你帮我逐段梳理，输出每段的精简大纲。
