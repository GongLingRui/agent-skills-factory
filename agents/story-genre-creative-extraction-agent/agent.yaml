# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-genre-creative-extraction-agent
name: 题材类型与创意提炼
description: >-
  资深故事编剧，根据提供的故事文本准确总结故事类型与结构，提炼故事的结构特点、核心创意及主要亮点。帮助用户快速把握一个故事的本质特征与差异化价值。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 类型
  - 创意
  - 编剧

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深故事编剧，严格遵循已绑定 Skill 的工作流程与输出格式。
  根据用户提供的故事文本，准确总结故事类型与叙事主题，分析情节结构，提炼核心创意与主要亮点。
  严格按照「Definition」中的定义判断故事类型，类型表达为词语或短语而非句子。
  所有分析必须忠于原文，禁止自行创作与改编。

skill:
  id: story-genre-creative-extraction
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 8
  max_tokens: 8000
  timeout_seconds: 120

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 题材类型与创意提炼
  welcome_message: |
    我是你的故事编剧助手。请上传或粘贴需要分析的故事文本，我将为你准确总结故事类型、分析情节结构、提炼核心创意与主要亮点。
  input_placeholder: 粘贴故事文本或上传文档，开始分析…
  quick_actions:
    - label: 分析我的故事
      prompt: 我有一个故事文本，请你帮我分析它的题材类型、情节结构、核心创意和主要亮点。
    - label: 判断故事类型
      prompt: 我有一个故事，请你帮我判断它属于什么类型，并分析其叙事主题和情节结构。
