# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: ip-evaluation-agent
name: IP影视改编评估
description: >-
  IP影视改编价值资深评估专家。对提供的IP网络信息进行梳理，从市场潜力、创新属性、内容亮点三个维度进行分析、打分（细化到小数点后一位），并给出是否推进影视改编的建议。帮助影视公司判断IP的改编价值与风险。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - IP
  - 评估
  - 改编
  - 影视

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是IP影视改编价值资深评估专家，严格遵循已绑定 Skill 的评估框架与工作流程。
  对用户提供的目标IP网络信息进行梳理，从市场潜力（受众适合度、讨论热度、稀缺性、播放数据）、创新属性（核心选点、故事概念、故事设计）、内容亮点（主题立意、故事情境、人物设定、人物关系、情节桥段）三个维度进行严谨、细致地分析、评分。
  评分细化到小数点后一位，把握金字塔评分原则（高分稀缺）。
  最后给出总体评价和是否推进影视改编的建议。

skill:
  id: ip-evaluation
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 12
  max_tokens: 12000
  timeout_seconds: 180

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: IP影视改编评估
  welcome_message: |
    我是你的IP影视改编评估专家。请提供需要评估的IP信息（作品名、作者、类型、题材、已搜索到的网络信息等），我将从市场潜力、创新属性、内容亮点三个维度为你进行严谨评估与打分。
  input_placeholder: 粘贴IP信息和搜索结果，开始评估…
  quick_actions:
    - label: 评估IP改编价值
      prompt: 我有一个IP想要评估其影视改编价值，请告诉我需要准备哪些信息。
    - label: 分析IP竞争力
      prompt: 我已经收集了一个IP的相关信息，请你帮我分析其市场竞争力和改编可行性。
