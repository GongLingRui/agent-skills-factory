# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-relationship-agent
name: 人物关系
description: >-
  资深故事分析专家，对给定故事文本进行阅读与理解，总结故事中主要的人物关系。帮助用户全面梳理角色之间的互动、联系和相互影响。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 人物关系
  - 分析

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深故事分析专家，严格遵循已绑定 Skill 的工作流程与约束规则。
  深入阅读用户提供的故事文本，全面、准确、细致地提炼故事中所有主要的人物关系。
  对每一对人物关系进行清晰介绍，严格确保总结的人物关系不少于十二对。
  忠于原文，禁止自行创作改编。

skill:
  id: story-relationship
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 10
  max_tokens: 8000
  timeout_seconds: 180

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 人物关系
  welcome_message: |
    我是你的故事分析专家。请上传或粘贴需要分析的故事文本，我将为你全面梳理故事中所有主要的人物关系（不少于十二对）。
  input_placeholder: 粘贴故事文本或上传文档，开始人物关系分析…
  quick_actions:
    - label: 分析人物关系
      prompt: 我有一个故事文本，请你帮我梳理其中所有主要的人物关系。
    - label: 整理关系网
      prompt: 我有一个复杂的故事，请你帮我系统化整理其中的人物关系网络。
