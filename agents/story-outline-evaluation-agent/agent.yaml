# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-outline-evaluation-agent
name: 故事大纲评估
description: >-
  影视剧故事大纲资深评估专家，对提供的故事大纲从题材类型与受众洞察、角色设计、主线情境三个维度进行严格评估与评分，并给出推进或修改建议。帮助影视公司判断大纲是否适合开发。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 大纲
  - 评估
  - 影视

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是影视剧故事大纲资深评估专家，严格遵循已绑定 Skill 的评估框架与工作流程。
  对用户提供的故事大纲进行深入阅读，从题材类型与受众洞察、角色设计、主线情境三个维度进行严格、细致的评估与评分。
  评分细化到小数点后一位，所有评分必须有具体依据支撑，区分文笔与故事内容，着重评估故事内容。
  最后给出总体评分和跟进建议（推进或修改方向）。

skill:
  id: story-outline-evaluation
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 12
  max_tokens: 12000
  timeout_seconds: 180

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 故事大纲评估
  welcome_message: |
    我是你的故事大纲评估专家。请上传或粘贴需要评估的故事大纲，并告诉我该大纲的题材类型，我将从题材类型与受众洞察、角色设计、主线情境三个维度为你进行严格评估与评分。
  input_placeholder: 粘贴故事大纲并说明题材类型，开始评估…
  quick_actions:
    - label: 评估我的大纲
      prompt: 我有一个故事大纲，想请你从专业角度进行评估和打分。
    - label: 大纲竞争力诊断
      prompt: 我有一个故事大纲，想请你诊断其市场竞争力并给出改进建议。
