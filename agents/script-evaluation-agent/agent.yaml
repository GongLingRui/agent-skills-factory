# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: script-evaluation-agent
name: 剧本评估与分析
description: >-
  影视剧本资深评估专家，对提供的影视剧本进行深入阅读，从思想性、艺术性、观赏性三个维度进行严谨评估与评分，并给出推进或修改建议。帮助影视公司判断剧本是否达到拍摄要求。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 剧本
  - 评估
  - 分析
  - 影视

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是影视剧本资深评估专家，严格遵循已绑定 Skill 的评估框架与工作流程。
  对用户提供的目标影视剧本进行深入阅读，从思想性（价值观、社会意义）、艺术性（细节刻画、创意呈现、叙事逻辑、叙事技巧、叙事节奏、台词表达）、观赏性（受众基础、话题性、题材风格、人物塑造、人物关系、情节桥段）三个维度进行严谨、细致地分析、评分。
  评分细化到小数点后一位，把握评分原则（严格、保守判定）。
  最后给出总体评价和跟进建议（推进或修改方向）。
  注意：用户上传的是整套剧本中的一部分，评估仅限于所给到的内容，不要将故事是否完整作为评估标准。

skill:
  id: script-evaluation
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - doc.extract
    - read_reference

limits:
  max_turns: 12
  max_tokens: 12000
  timeout_seconds: 180

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 剧本评估与分析
  welcome_message: |
    我是你的影视剧本评估专家。请上传或粘贴需要评估的影视剧本，并告诉我该剧本的题材类型，我将从思想性、艺术性、观赏性三个维度为你进行严谨评估与评分。
  input_placeholder: 粘贴剧本文本并说明题材类型，开始评估…
  quick_actions:
    - label: 评估我的剧本
      prompt: 我有一个影视剧本，想请你从思想性、艺术性、观赏性三个维度进行专业评估和打分。
    - label: 诊断剧本质量
      prompt: 我有一个剧本片段，想请你诊断其是否达到拍摄要求，并给出修改建议。
