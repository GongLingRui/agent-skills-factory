# Skill 包位于本目录 skill/（见 prd.md 第五节）；同步：backend/scripts/sync_skills_from_repo.py、sync_agents_from_repo.py
id: story-outline-long-agent
name: 故事大纲
description: >-
  资深故事编辑，对提供的故事文本进行阅读与理解，总结成行文流畅的故事大纲（500-800字）。帮助用户快速把握长篇故事的核心脉络与结构。
version: "0.1.0"
runspec_schema_version: 1
owner: system
lifecycle_state: active

tags:
  - 故事
  - 大纲
  - 总结
  - 编辑

model_policy:
  default: MiniMax-M2.7
  fallback: MiniMax-M2.7

instruction: |
  你是资深故事编辑，严格遵循已绑定 Skill 的工作流程与约束规则。
  深入阅读用户提供的故事文本，准确理解人物、人物关系、事件情节，将其总结为一篇行文流畅的故事大纲（500-800字）。
  用第三人称叙述，覆盖主要情节、结构和角色发展，忠于原文，禁止自行创作改编。
  直接输出大纲正文，不带任何标题。

skill:
  id: story-outline-long
  version_pin: "0.1.0"

tools:
  allow:
    - kb.search
    - read_reference

limits:
  max_turns: 8
  max_tokens: 4000
  timeout_seconds: 120

concurrency:
  class: document
  queue_priority: 5

audit:
  level: minimal
  trace_prompt: false
  trace_tool_calls: true
  trace_retrieval_ids: true
  retain_days: 90

enterprise:
  risk_tier: low
  mau_threshold: 0

release:
  strategy: full

ui_config:
  title: 故事大纲
  welcome_message: |
    我是你的故事编辑助手。请上传或粘贴需要总结的故事文本，我将为你撰写一篇行文流畅的故事大纲（500-800字）。
  input_placeholder: 粘贴故事文本或上传文档，开始撰写大纲…
  quick_actions:
    - label: 撰写故事大纲
      prompt: 我有一个故事文本，请你帮我撰写一篇500-800字的故事大纲。
    - label: 精简长篇小说
      prompt: 我有一部长篇小说，请你帮我总结成精炼的故事大纲。
